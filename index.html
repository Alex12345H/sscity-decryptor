<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Save Editor</title>
<link rel="icon" href="sscityicon.png" type="image/png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <h1>🏄 SSC Save Editor</h1>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- FILE LOAD -->
<div id="load-section">
  <input type="file" id="fileInput">
  <div id="msg-load"></div>
</div>

<!-- TABS -->
<div id="main" style="display:none;">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('wallet',this)" data-de="💰 Währung" data-en="💰 Wallet">💰 Währung</button>
    <button class="tab" onclick="switchTab('player',this)" data-de="⭐ Spieler" data-en="⭐ Player">⭐ Spieler</button>
    <button class="tab" onclick="switchTab('surfers',this)" data-de="🧑 Surfer" data-en="🧑 Surfers">🧑 Surfer</button>
    <button class="tab" onclick="switchTab('boards',this)" data-de="🛹 Boards" data-en="🛹 Boards">🛹 Boards</button>
    <button class="tab" onclick="switchTab('season',this)" data-de="🎫 Season" data-en="🎫 Season">🎫 Season</button>
    <button class="tab" onclick="switchTab('save',this)" data-de="💾 Speichern" data-en="💾 Save">💾 Speichern</button>
  </div>

  <!-- WALLET -->
  <div id="tab-wallet" class="panel active">
    <div class="card">
      <label data-de="Münzen" data-en="Coins">Münzen</label>
      <input type="number" id="coins" min="0">
      <label data-de="Schlüssel" data-en="Keys">Schlüssel</label>
      <label data-de="Tickets" data-en="Tickets">Schlüssel</label>
      <input type="number" id="keys" min="0">
      <label data-de="Wiederbelebungsdosen" data-en="Revive Cans">Wiederbelebungsdosen</label>
      <input type="number" id="revives" min="0">
      <label>Board Tokens</label>
<input type="number" id="boardtokens" min="0">
<label>Character Tokens</label>
<input type="number" id="chartokens" min="0">
<label>Tickets</label>
<input type="number" id="tickets" min="0">
    </div>
  </div>

  <!-- PLAYER -->
  <div id="tab-player" class="panel">
    <div class="card">
      <label data-de="Level" data-en="Level">Level</label>
      <input type="number" id="level" min="1">
      <label data-de="XP" data-en="XP">XP</label>
      <input type="number" id="xp" min="0">
    </div>
  </div>

  <!-- SURFERS -->
  <div id="tab-surfers" class="panel">
    <div class="card">
      <div class="bulk-row">
        <input type="number" id="all-slevel" min="1" max="20" placeholder="Level (max 20)">
        <button class="btn-blue" onclick="setAllSurferLevels()">Alle Level</button>
      </div>
      <div class="bulk-row">
        <input type="number" id="all-hs" min="0" placeholder="Highscore">
        <button class="btn-blue" onclick="setAllHighscores()">Alle HS</button>
      </div>
      <button class="btn-gray" onclick="unlockAllSurfers()">Alle freischalten</button>
    </div>
    <div id="surfer-list"></div>
  </div>

  <!-- BOARDS -->
  <div id="tab-boards" class="panel">
    <div class="card">
      <div class="bulk-row">
        <input type="number" id="all-blevel" min="1" max="20" placeholder="Level (max 20)">
        <button class="btn-blue" onclick="setAllBoardLevels()">Alle Level</button>
      </div>
      <button class="btn-gray" onclick="unlockAllBoards()">Alle freischalten</button>
    </div>
    <div id="board-list"></div>
  </div>

  <!-- SEASON PASS -->
  <div id="tab-season" class="panel">
    <div class="card">
      <div id="sp-status" class="sp-status sp-off"></div>
      <button id="sp-btn" class="btn-orange" onclick="toggleSeasonPass()"></button>
      <div id="sp-points-section" style="display:none; margin-top:10px;">
        <label data-de="Season Pass Punkte" data-en="Season Pass Points">Season Pass Punkte</label>
        <input type="number" id="sp-points-val" min="0">
        <button class="btn-blue" onclick="applySpPoints()">Punkte setzen</button>
      </div>
      <div id="msg-sp"></div>
    </div>
  </div>

  <!-- SAVE -->
  <div id="tab-save" class="panel">
    <div class="card">
      <button class="btn-green" onclick="saveFile()">Encrypt & Download</button>
      <div id="msg-save"></div>
    </div>
  </div>
</div>

<footer id="footer">
  <p>Hosted by <a href="https://www.youtube.com/@MOBILEịTUTORIALS">MOBILE TUTORIALS</a> - DecKey by Mkx</p>
</footer>

<script src="script.js"></script>


</body></html>
